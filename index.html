<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter</title>

<style>

body{
margin:0;
overflow:hidden;
background:#2c3e50;
font-family:Arial;
}

canvas{
background:#3b4b5a;
display:block;
}

#menu{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#1e272e;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<div id="menu">
<h1>Select Language / Оберіть мову</h1>
<button onclick="setLanguage('ua')">Українська</button>
<button onclick="setLanguage('en')">English</button>
</div>

<div id="ui"></div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let language=localStorage.getItem("lang")

const text={
ua:{
coins:"Монети",
score:"Очки",
record:"Рекорд",
wave:"Хвиля",
gameOver:"Поразка",
build:"Будівля"
},
en:{
coins:"Coins",
score:"Score",
record:"Record",
wave:"Wave",
gameOver:"Game Over",
build:"Building"
}
}

if(language){
document.getElementById("menu").style.display="none"
}

function setLanguage(l){
language=l
localStorage.setItem("lang",l)
document.getElementById("menu").style.display="none"
}

let player={
x:canvas.width/2,
y:canvas.height/2,
size:20,
speed:4
}

let bullets=[]
let zombies=[]
let buildings=[]

let coins=parseInt(localStorage.getItem("coins"))||0
let record=parseInt(localStorage.getItem("record"))||0

let score=0
let wave=1
let spawnTimer=0

const keys={}

addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

canvas.addEventListener("click",shoot)

addEventListener("contextmenu",e=>{
e.preventDefault()
build(e.clientX,e.clientY)
})

function shoot(e){

let dx=e.clientX-player.x
let dy=e.clientY-player.y
let dist=Math.hypot(dx,dy)

bullets.push({
x:player.x,
y:player.y,
vx:dx/dist*8,
vy:dy/dist*8
})

}

function build(x,y){

let size=30

if(Math.abs(x-player.x)<40 && Math.abs(y-player.y)<40) return

buildings.push({x:x-size/2,y:y-size/2,size})

}

function spawnZombie(){

let side=Math.floor(Math.random()*4)

let x,y

if(side===0){
x=0
y=Math.random()*canvas.height
}

if(side===1){
x=canvas.width
y=Math.random()*canvas.height
}

if(side===2){
x=Math.random()*canvas.width
y=0
}

if(side===3){
x=Math.random()*canvas.width
y=canvas.height
}

let type="medium"

if(wave>10) type="big"
else if(wave>5) type="small"

let size=20
let hp=2
let speed=1

if(type==="small"){
size=12
hp=1
speed=2
}

if(type==="big"){
size=30
hp=5
speed=0.7
}

zombies.push({x,y,size,hp,speed,type})

}

function update(){

if(keys["w"]) player.y-=player.speed
if(keys["s"]) player.y+=player.speed
if(keys["a"]) player.x-=player.speed
if(keys["d"]) player.x+=player.speed

spawnTimer++

if(spawnTimer>60){
spawnZombie()
spawnTimer=0
}

bullets.forEach((b,i)=>{
b.x+=b.vx
b.y+=b.vy
})

zombies.forEach((z,zi)=>{

let dx=player.x-z.x
let dy=player.y-z.y
let dist=Math.hypot(dx,dy)

z.x+=dx/dist*z.speed
z.y+=dy/dist*z.speed

if(dist<20){

gameOver()

}

bullets.forEach((b,bi)=>{

if(Math.abs(b.x-z.x)<z.size && Math.abs(b.y-z.y)<z.size){

z.hp--
bullets.splice(bi,1)

if(z.hp<=0){

score++
coins++

zombies.splice(zi,1)

}

}

})

})

if(score>record){
record=score
localStorage.setItem("record",record)
}

localStorage.setItem("coins",coins)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="blue"
ctx.fillRect(player.x-10,player.y-10,20,20)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,4)
})

buildings.forEach(b=>{
ctx.fillStyle="#777"
ctx.fillRect(b.x,b.y,b.size,b.size)
})

zombies.forEach(z=>{

if(z.type==="small") ctx.fillStyle="#5eff5e"
else if(z.type==="medium") ctx.fillStyle="#2ecc71"
else ctx.fillStyle="#145a32"

ctx.fillRect(z.x-z.size/2,z.y-z.size/2,z.size,z.size)

ctx.fillStyle="red"
ctx.fillRect(z.x-15,z.y-z.size/2-8,30,4)

ctx.fillStyle="lime"
ctx.fillRect(z.x-15,z.y-z.size/2-8,30*(z.hp/5),4)

})

document.getElementById("ui").innerHTML=

`${text[language].coins}: ${coins}<br>
${text[language].score}: ${score}<br>
${text[language].record}: ${record}<br>
${text[language].wave}: ${wave}`

}

function gameOver(){

alert(text[language].gameOver)

score=0
zombies=[]
bullets=[]
player.x=canvas.width/2
player.y=canvas.height/2

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
