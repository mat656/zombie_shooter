<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter</title>

<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:Arial;}
canvas{display:block;background:#1a1a1a;}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:12px;
border-radius:10px;
display:none;
}

button{
padding:6px;
margin-top:5px;
width:140px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#reloadBar{
width:140px;
height:10px;
background:#333;
border-radius:5px;
margin-top:5px;
overflow:hidden;
display:none;
}

#reloadProgress{
height:100%;
width:0%;
background:lime;
}

#lang,#platform,#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
text-align:center;
}

#platform,#gameOver{display:none;}

#gameOver{border:2px solid red;}

#shop{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
display:none;
border:2px solid gold;
}

#touch{
position:absolute;
bottom:30px;
left:30px;
display:none;
}

#joystickBase{
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
position:relative;
}

#joystick{
width:50px;
height:50px;
background:white;
border-radius:50%;
position:absolute;
top:35px;
left:35px;
touch-action:none;
}
</style>
</head>

<body>

<div id="lang">
<h2>Zombie Shooter</h2>
<button onclick="chooseLang('uk')">Українська</button>
<button onclick="chooseLang('en')">English</button>
</div>

<div id="platform">
<h3>Платформа</h3>
<button onclick="startGame('pc')">ПК</button>
<button onclick="startGame('mobile')">Телефон</button>
</div>

<div id="gameOver">
<h2>💀 Game Over</h2>
<p id="finalScore"></p>
<button onclick="restartGame()">🔄 Restart</button>
</div>

<div id="ui">
<div id="stats"></div>

<button onclick="togglePause()">⏸ Pause</button>
<button onclick="toggleShop()">🛒 Shop</button>
<button onclick="reload()">🔄 Reload</button>

<div id="reloadBar">
<div id="reloadProgress"></div>
</div>

</div>

<div id="shop">
<h3>🛒 Weapon Shop</h3>
<div id="shopItems"></div>
<button onclick="toggleShop()">Close</button>
</div>

<canvas id="game"></canvas>

<div id="touch">
<div id="joystickBase">
<div id="joystick"></div>
</div>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let lang="uk"
let platform="pc"
let paused=false
let gameOver=false

let player
let zombies=[]
let bullets=[]

let coins=0
let score=0
let wave=1

let keys={}
let lastShot=0

let ownedWeapons=["pistol"]
let currentWeapon="pistol"

let ammo=12
let maxAmmo=12
let reloading=false

const weapons={
pistol:{damage:20,fireRate:400,speed:10,mag:12,reload:1200,price:0},
rifle:{damage:15,fireRate:120,speed:14,mag:30,reload:2000,price:150},
shotgun:{damage:40,fireRate:700,speed:9,mag:6,reload:2500,price:220}
}

function chooseLang(l){
lang=l
document.getElementById("lang").style.display="none"
document.getElementById("platform").style.display="block"
}

function startGame(p){

platform=p

document.getElementById("platform").style.display="none"
document.getElementById("ui").style.display="block"

if(platform=="mobile"){
document.getElementById("touch").style.display="block"
}

loadData()

player={
x:canvas.width/2,
y:canvas.height/2,
size:20,
speed:4,
hp:100
}

spawnWave()
loop()

}

function restartGame(){
location.reload()
}

function saveData(){

localStorage.setItem("coins",coins)
localStorage.setItem("weapons",JSON.stringify(ownedWeapons))
localStorage.setItem("currentWeapon",currentWeapon)

}

function loadData(){

coins=parseInt(localStorage.getItem("coins"))||0
ownedWeapons=JSON.parse(localStorage.getItem("weapons"))||["pistol"]
currentWeapon=localStorage.getItem("currentWeapon")||"pistol"

maxAmmo=weapons[currentWeapon].mag
ammo=maxAmmo

}

addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

canvas.addEventListener("mousedown",shoot)

canvas.addEventListener("touchstart",function(e){
let t=e.touches[0]
shoot({clientX:t.clientX,clientY:t.clientY})
})

class Zombie{

constructor(x,y){

this.x=x
this.y=y
this.size=20
this.hp=40+wave*5
this.speed=1+wave*0.1
this.damage=6
this.lastHit=0

}

update(){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.hypot(dx,dy)

this.x+=dx/dist*this.speed
this.y+=dy/dist*this.speed

if(dist<player.size+this.size){

if(Date.now()-this.lastHit>900){

player.hp-=this.damage
this.lastHit=Date.now()

}

}

}

draw(){

ctx.fillStyle="green"
ctx.fillRect(this.x-10,this.y-10,20,20)

}

}

function spawnWave(){

let count=Math.min(3+wave,20)

for(let i=0;i<count;i++){

let x,y

if(Math.random()<0.5){

x=Math.random()<0.5?-40:canvas.width+40
y=Math.random()*canvas.height

}else{

x=Math.random()*canvas.width
y=Math.random()<0.5?-40:canvas.height+40

}

zombies.push(new Zombie(x,y))

}

}

function shoot(e){

if(paused||gameOver||reloading)return
if(ammo<=0)return

let w=weapons[currentWeapon]

if(Date.now()-lastShot<w.fireRate)return

lastShot=Date.now()
ammo--

let angle=Math.atan2(e.clientY-player.y,e.clientX-player.x)

bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*w.speed,
dy:Math.sin(angle)*w.speed,
damage:w.damage
})

}

function reload(){

if(reloading||ammo==maxAmmo)return

reloading=true

let bar=document.getElementById("reloadBar")
let prog=document.getElementById("reloadProgress")

bar.style.display="block"

let start=Date.now()
let time=weapons[currentWeapon].reload

let interval=setInterval(()=>{

let p=(Date.now()-start)/time*100
prog.style.width=p+"%"

if(p>=100){

clearInterval(interval)

ammo=maxAmmo
reloading=false
prog.style.width="0%"
bar.style.display="none"

}

},16)

}

function togglePause(){
paused=!paused
}

function toggleShop(){

let shop=document.getElementById("shop")

if(shop.style.display=="block"){
shop.style.display="none"
paused=false
}else{
renderShop()
shop.style.display="block"
paused=true
}

}

function renderShop(){

let div=document.getElementById("shopItems")
div.innerHTML=""

for(let w in weapons){

let weapon=weapons[w]
let owned=ownedWeapons.includes(w)

let btn=document.createElement("button")

if(!owned){

btn.innerText=w+" "+weapon.price

btn.onclick=()=>{

if(coins>=weapon.price){

coins-=weapon.price
ownedWeapons.push(w)

saveData()
renderShop()

}

}

}else{

btn.innerText=w+(currentWeapon==w?" ✔":" equip")

btn.onclick=()=>{

currentWeapon=w
maxAmmo=weapon.mag
ammo=maxAmmo

saveData()
renderShop()

}

}

div.appendChild(btn)

}

}

let joy={dx:0,dy:0}

const joyBase=document.getElementById("joystickBase")
const joyHandle=document.getElementById("joystick")

joyBase.addEventListener("touchmove",e=>{

let rect=joyBase.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

let dist=Math.hypot(x,y)
let max=50

if(dist>max){
x=x/dist*max
y=y/dist*max
}

joyHandle.style.transform=`translate(${x}px,${y}px)`

joy.dx=x/50
joy.dy=y/50

})

joyBase.addEventListener("touchend",()=>{

joyHandle.style.transform="translate(0px,0px)"
joy.dx=0
joy.dy=0

})

function update(){

if(paused||gameOver)return

let mx=0
let my=0

if(platform=="pc"){

if(keys["w"]||keys["ArrowUp"])my-=player.speed
if(keys["s"]||keys["ArrowDown"])my+=player.speed
if(keys["a"]||keys["ArrowLeft"])mx-=player.speed
if(keys["d"]||keys["ArrowRight"])mx+=player.speed

}else{

mx=joy.dx*player.speed*2
my=joy.dy*player.speed*2

}

player.x+=mx
player.y+=my

player.x=Math.max(player.size,Math.min(canvas.width-player.size,player.x))
player.y=Math.max(player.size,Math.min(canvas.height-player.size,player.y))

bullets.forEach((b,i)=>{

b.x+=b.dx
b.y+=b.dy

zombies.forEach((z,zi)=>{

if(Math.hypot(b.x-z.x,b.y-z.y)<20){

z.hp-=b.damage
bullets.splice(i,1)

if(z.hp<=0){

zombies.splice(zi,1)

coins+=5
score+=10

saveData()

}

}

})

})

zombies.forEach(z=>z.update())

if(zombies.length==0){
wave++
spawnWave()
}

if(player.hp<=0){

gameOver=true

document.getElementById("gameOver").style.display="block"
document.getElementById("finalScore").innerText="🎯 Score: "+score

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

bullets.forEach(b=>{
ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

zombies.forEach(z=>z.draw())

}

function updateUI(){

document.getElementById("stats").innerHTML=
`❤️ HP: ${player.hp}
<br>🎯 Score: ${score}
<br>🪙 Coins: ${coins}
<br>🌊 Wave: ${wave}
<br>🔫 Ammo: ${ammo}/${maxAmmo}`

}

function loop(){

update()
draw()
updateUI()

requestAnimationFrame(loop)

}

</script>
</body>
</html>
