<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Shooter City: Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: white; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; background: #1a1a1a; }

        /* UI */
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; z-index: 100; display: none; border: 1px solid #444; pointer-events: none; }
        .btn { pointer-events: auto; background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 5px; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn:hover { background: #666; }

        /* Menus */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal { background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #ff4444; width: 300px; }
        
        #shop-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 15px; border: 2px solid #ffd700; display: none; z-index: 250; width: 280px; }

        /* Mobile Controls */
        #mobile-ui { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 150; pointer-events: none; }
        .joy-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; }
        .action-btns { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .circle-btn { width: 75px; height: 75px; background: rgba(255,68,68,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="lang-step" class="modal">
        <h2>ZOMBIE CITY</h2>
        <button class="btn" onclick="setLang('uk')">Українська</button>
        <button class="btn" onclick="setLang('en')">English</button>
    </div>
    <div id="device-step" class="modal" style="display:none;">
        <h2 id="dev-t">Пристрій</h2>
        <button class="btn" onclick="setDev('pc')">💻 ПК (Клавіатура)</button>
        <button class="btn" onclick="setDev('mobile')">📱 Телефон (Сенсор)</button>
    </div>
</div>

<div id="ui">
    <div id="stats"></div>
    <button class="btn" id="shopBtn" onclick="toggleShop()">🛒 SHOP</button>
    <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>
</div>

<div id="shop-menu">
    <h2 style="color:#ffd700">Магазин</h2>
    <div id="shop-items"></div>
    <button class="btn" onclick="toggleShop()" style="background:#ff4444">CLOSE</button>
</div>

<div id="mobile-ui">
    <div id="joystick" class="joy-zone"></div>
    <div class="action-btns">
        <div class="circle-btn" id="fireBtn" style="background:rgba(255,215,0,0.6)">FIRE</div>
        <div class="circle-btn" onclick="manualReload()">RELOAD</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
let lang = localStorage.getItem('z_lang');
let device = '', paused = false, gameOver = false, shopOpen = false;
let score = 0, coins = parseInt(localStorage.getItem('z_coins')) || 0, wave = 1;
let player, zombies = [], bullets = [], keys = {}, mouse = {x:0, y:0};
let isFiring = false, lastShotTime = 0;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const txt = {
    uk: { dev: "Оберіть пристрій", hp: "❤️ HP", wave: "🌊 Хвиля", coins: "🪙 Монети", pause: "⏸ Пауза", resume: "▶ Грати", ammo: "📦 Набої" },
    en: { dev: "Select Device", hp: "❤️ HP", wave: "🌊 Wave", coins: "🪙 Coins", pause: "⏸ Pause", resume: "▶ Resume", ammo: "📦 Ammo" }
};

// --- МЕНЮ ТА НАЛАШТУВАННЯ ---
function setLang(l) {
    lang = l; localStorage.setItem('z_lang', l);
    document.getElementById('lang-step').style.display = 'none';
    document.getElementById('device-step').style.display = 'block';
    document.getElementById('dev-t').innerText = txt[lang].dev;
}
if(lang) setLang(lang);

function setDev(d) {
    device = d;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    if(d === 'mobile') document.getElementById('mobile-ui').style.display = 'flex';
    init();
}

function init() {
    player = { 
        x: canvas.width/2, y: canvas.height/2, size: 20, 
        hp: 100, speed: 4, lastHit: 0, 
        ammo: 12, maxAmmo: 12, reloading: false 
    };
    
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    
    canvas.onmousedown = e => { if(device==='pc') isFiring = true; updateMouse(e); };
    window.onmouseup = () => isFiring = false;
    canvas.onmousemove = updateMouse;

    if(device === 'mobile') {
        const f = document.getElementById('fireBtn');
        f.ontouchstart = (e) => { e.preventDefault(); isFiring = true; };
        f.ontouchend = () => isFiring = false;
        
        const j = document.getElementById('joystick');
        j.ontouchmove = (e) => {
            e.preventDefault();
            let t = e.touches[0]; let r = j.getBoundingClientRect();
            let cx = r.left + r.width/2, cy = r.top + r.height/2;
            keys['ArrowUp'] = t.clientY < cy - 20; keys['ArrowDown'] = t.clientY > cy + 20;
            keys['ArrowLeft'] = t.clientX < cx - 20; keys['ArrowRight'] = t.clientX > cx + 20;
        };
        j.ontouchend = () => { keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false; };
    }
    spawnWave();
    requestAnimationFrame(loop);
}

function updateMouse(e) { mouse.x = e.clientX; mouse.y = e.clientY; }

// --- КЛАС ЗОМБІ ---
class Zombie {
    constructor() {
        let s = Math.floor(Math.random()*4);
        this.x = s%2===0 ? Math.random()*canvas.width : (s===1?canvas.width+50:-50);
        this.y = s%2!==0 ? Math.random()*canvas.height : (s===0?-50:canvas.height+50);
        
        const types = [
            { hp: 50, speed: 1.5, color: '#166534', size: 22, dmg: 10 },
            { hp: 30, speed: 2.6, color: '#f87171', size: 18, dmg: 5 },
            { hp: 150, speed: 0.8, color: '#450a0a', size: 35, dmg: 20 }
        ];
        Object.assign(this, types[Math.floor(Math.random() * (wave > 3 ? 3 : 1))]);
    }
    update() {
        let dx = player.x - this.x, dy = player.y - this.y, d = Math.hypot(dx, dy);
        this.x += (dx/d)*this.speed; this.y += (dy/d)*this.speed;
        if(d < this.size && Date.now() - player.lastHit > 1000) {
            player.hp -= this.dmg; player.lastHit = Date.now();
        }
    }
}

// --- ІГРОВИЙ ЦИКЛ ---
function loop() {
    if(!paused && !gameOver && !shopOpen) update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    if(keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    if(isFiring && Date.now() - lastShotTime > 200 && player.ammo > 0 && !player.reloading) {
        let angle = (device === 'pc') ? Math.atan2(mouse.y - player.y, mouse.x - player.x) : 
                    (zombies.length > 0 ? Math.atan2(zombies[0].y - player.y, zombies[0].x - player.x) : 0);
        bullets.push({x: player.x, y: player.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12});
        player.ammo--; lastShotTime = Date.now();
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        zombies.forEach((z, zi) => {
            if(Math.hypot(b.x-z.x, b.y-z.y) < z.size) {
                z.hp -= 25; bullets.splice(i, 1);
                if(z.hp <= 0) { zombies.splice(zi, 1); score += 10; coins += 5; }
            }
        });
    });

    zombies.forEach(z => z.update());
    if(zombies.length === 0) { wave++; spawnWave(); }
    if(player.hp <= 0) endGame();
    updateUI();
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    // Player
    ctx.fillStyle = "#3b82f6"; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    // Bullets
    ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 5, 5));
    // Zombies
    zombies.forEach(z => { ctx.fillStyle = z.color; ctx.fillRect(z.x-z.size/2, z.y-z.size/2, z.size, z.size); });
}

function updateUI() {
    document.getElementById('stats').innerHTML = `
        ${txt[lang].hp}: ${player.hp} | ${txt[lang].wave}: ${wave} | ${txt[lang].coins}: ${coins}<br>
        ${txt[lang].ammo}: ${player.reloading ? "..." : player.ammo}
    `;
}

function manualReload() {
    if(player.reloading || player.ammo === player.maxAmmo) return;
    player.reloading = true;
    setTimeout(() => { player.ammo = player.maxAmmo; player.reloading = false; }, 1500);
}

function togglePause() {
    paused = !paused;
    document.getElementById('pauseBtn').innerText = paused ? txt[lang].resume : txt[lang].pause;
}

function toggleShop() {
    shopOpen = !shopOpen;
    document.getElementById('shop-menu').style.display = shopOpen ? 'block' : 'none';
}

function spawnWave() { for(let i=0; i<4+wave*2; i++) zombies.push(new Zombie()); }

function endGame() {
    gameOver = true;
    localStorage.setItem('z_coins', coins);
    alert("GAME OVER! Score: " + score);
    location.reload();
}
</script>
</body>
</html>
