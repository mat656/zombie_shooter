<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter City Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body{margin:0;overflow:hidden;font-family:sans-serif;background:#111;color:white;touch-action:none;}
    canvas{display:block;background:#1a1a1a;}
    #ui{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.8);padding:15px;border-radius:10px;z-index:100;display:none;pointer-events:none;}
    .ctrl-btn{pointer-events:auto;margin-top:5px;padding:8px;width:100%;background:#444;color:white;border:none;border-radius:5px;}
    #menu-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;}
    .modal{background:#222;padding:30px;border-radius:15px;text-align:center;border:2px solid #ff4444;max-width:80%;}
    #mobile-controls{position:absolute;bottom:20px;left:20px;width:100%;height:150px;display:none;z-index:150;pointer-events:none;}
    .joy{position:absolute;background:rgba(255,255,255,0.2);border-radius:50%;pointer-events:auto;}
    #stick{width:120px;height:120px;bottom:20px;left:20px;}
    #action-btns{position:absolute;bottom:20px;right:40px;display:flex;gap:15px;pointer-events:auto;}
    .round-btn{width:70px;height:70px;background:rgba(255,68,68,0.5);border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:12px;font-weight:bold;}
</style>
</head>
<body>

<div id="menu-overlay">
    <div id="lang-step" class="modal">
        <h2>ZOMBIE CITY</h2>
        <button class="ctrl-btn" onclick="setLang('uk')">Українська</button>
        <button class="ctrl-btn" onclick="setLang('en')">English</button>
    </div>
    <div id="device-step" class="modal" style="display:none;">
        <h2 id="device-title">Оберіть пристрій</h2>
        <button class="ctrl-btn" onclick="initDevice('pc')">💻 ПК (Клавіатура)</button>
        <button class="ctrl-btn" onclick="initDevice('mobile')">📱 Телефон (Сенсор)</button>
    </div>
    <div id="tutorial-step" class="modal" style="display:none;">
        <h2 id="tut-title">Керування</h2>
        <p id="tut-text"></p>
        <button class="ctrl-btn" onclick="start()">ПІШЛИ!</button>
    </div>
</div>

<div id="ui">
    <div id="stats"></div>
    <button class="ctrl-btn" id="shopBtn" onclick="toggleShop()">🛒 Shop</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
</div>

<div id="mobile-controls">
    <div id="stick" class="joy"></div>
    <div id="action-btns">
        <div class="round-btn" id="relMob">RELOAD</div>
        <div class="round-btn" id="fireMob" style="background:rgba(255,215,0,0.5)">FIRE</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
let lang = localStorage.getItem('z_lang') || 'uk';
let device = '';
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x:0, y:0, size:18, speed:4, hp:100, lastHit:0 };
let keys = {}, zombies = [], bullets = [], walls = [];
let score = 0, coins = parseInt(localStorage.getItem('z_coins'))||0, wave = 1;
let paused = false, gameOver = false, isFiring = false;

const texts = {
    uk: { pause: "⏸ Пауза", resume: "▶ Продовжити", dev: "Оберіть пристрій", tutPC: "WASD / Стрілочки - рух\nМишка - вогонь\nR - перезарядка", tutMob: "Джойстик зліва - рух\nКнопки справа - вогонь та перезарядка", wave: "Хвиля", hp: "Життя", coins: "Монети" },
    en: { pause: "⏸ Pause", resume: "▶ Resume", dev: "Select Device", tutPC: "WASD / Arrows - move\nMouse - fire\nR - reload", tutMob: "Joystick left - move\nButtons right - fire and reload", wave: "Wave", hp: "HP", coins: "Coins" }
};

// === Налаштування меню ===
function setLang(l) {
    lang = l;
    localStorage.setItem('z_lang', l);
    document.getElementById('lang-step').style.display = 'none';
    document.getElementById('device-step').style.display = 'block';
    document.getElementById('device-title').innerText = texts[lang].dev;
}

function initDevice(d) {
    device = d;
    document.getElementById('device-step').style.display = 'none';
    document.getElementById('tutorial-step').style.display = 'block';
    document.getElementById('tut-text').innerText = device === 'pc' ? texts[lang].tutPC : texts[lang].tutMob;
}

function start() {
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    if(device === 'mobile') document.getElementById('mobile-controls').style.display = 'block';
    
    player.x = canvas.width/2; player.y = canvas.height/2;
    document.getElementById('pauseBtn').innerText = texts[lang].pause;
    
    // Керування клавішами (виправлено)
    window.addEventListener("keydown", e => { 
        keys[e.code] = true;
        if(e.code === 'KeyR') reload();
        if(e.code === 'KeyP') togglePause();
    });
    window.addEventListener("keyup", e => keys[e.code] = false);
    
    // Мобільне керування (спрощений джойстик)
    if(device === 'mobile') {
        const fireBtn = document.getElementById('fireMob');
        fireBtn.addEventListener('touchstart', () => isFiring = true);
        fireBtn.addEventListener('touchend', () => isFiring = false);
        document.getElementById('relMob').addEventListener('touchstart', reload);
        
        let stick = document.getElementById('stick');
        stick.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            let rect = stick.getBoundingClientRect();
            let centerX = rect.left + rect.width/2;
            let centerY = rect.top + rect.height/2;
            keys['ArrowUp'] = touch.clientY < centerY - 10;
            keys['ArrowDown'] = touch.clientY > centerY + 10;
            keys['ArrowLeft'] = touch.clientX < centerX - 10;
            keys['ArrowRight'] = touch.clientX > centerX + 10;
        });
        stick.addEventListener('touchend', () => { 
            keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = false; 
        });
    }

    spawnWave();
    requestAnimationFrame(loop);
}

// === Клас Зомбі (виправлено пошкодження) ===
class Zombie {
    constructor(type) {
        let side = Math.floor(Math.random()*4);
        this.x = side%2===0 ? Math.random()*canvas.width : (side===1?canvas.width+50:-50);
        this.y = side%2!==0 ? Math.random()*canvas.height : (side===0?-50:canvas.height+50);
        
        const configs = {
            runner: { hp: 30, speed: 2.5, color: '#f87171', size: 15, damage: 10 },
            tank: { hp: 200, speed: 0.7, color: '#450a0a', size: 35, damage: 25 },
            normal: { hp: 60, speed: 1.5, color: '#166534', size: 22, damage: 15 }
        };
        Object.assign(this, configs[type]);
    }
    update() {
        let dx = player.x - this.x, dy = player.y - this.y;
        let dist = Math.hypot(dx, dy);
        this.x += (dx/dist)*this.speed;
        this.y += (dy/dist)*this.speed;

        // Пошкодження ривками (раз на 1 секунду)
        if(dist < this.size + player.size && Date.now() - player.lastHit > 1000) {
            player.hp -= this.damage;
            player.lastHit = Date.now();
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }
}

function loop() {
    if(paused || gameOver) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    // Рух (ПК + Стрілочки)
    if(keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    zombies.forEach(z => z.update());
    
    // Авто-вогонь для мобілки
    if(isFiring && device === 'mobile') autoShoot();

    if(player.hp <= 0) {
        gameOver = true;
        alert("GAME OVER! Score: " + score);
        location.reload(); // Перезавантажить гру, але завдяки localStorage мова збережеться!
    }
    updateUI();
}

function updateUI() {
    document.getElementById('stats').innerHTML = `
        ${texts[lang].hp}: ${player.hp} | ${texts[lang].wave}: ${wave} | ${texts[lang].coins}: ${coins}
    `;
}

function togglePause() {
    paused = !paused;
    document.getElementById('pauseBtn').innerText = paused ? texts[lang].resume : texts[lang].pause;
    if(!paused) loop();
}

function spawnWave() {
    let types = ['normal', 'runner', 'tank'];
    for(let i=0; i<5+wave*2; i++) {
        zombies.push(new Zombie(types[Math.floor(Math.random()*types.length)]));
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#3b82f6";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    zombies.forEach(z => z.draw());
}

function reload() { console.log("Reloading..."); }
function toggleShop() { alert("Магазин скоро..."); }
function autoShoot() { /* Логіка пострілу сюди */ }

// Запуск автоматичної перевірки мови
if(localStorage.getItem('z_lang')) {
    document.getElementById('lang-step').style.display = 'none';
    document.getElementById('device-step').style.display = 'block';
    setLang(localStorage.getItem('z_lang'));
}
</script>
</body>
</html>
