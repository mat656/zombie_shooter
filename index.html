<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Shooter City Final</title>
    <style>
        body { margin:0; overflow:hidden; font-family:sans-serif; background:#111; color:white; touch-action:none; -webkit-user-select:none; }
        canvas { display:block; background:#1a1a1a; }
        #ui { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.8); padding:10px; border-radius:8px; z-index:100; display:none; border:1px solid #555; pointer-events:none; }
        .btn { pointer-events:auto; background:#444; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-top:5px; width:100%; font-weight:bold; }
        #overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:200; }
        .modal { background:#222; padding:25px; border-radius:15px; text-align:center; border:2px solid #ff4444; width:280px; }
        #mobile-ui { position:absolute; bottom:30px; width:100%; display:none; justify-content:space-between; padding:0 30px; box-sizing:border-box; z-index:150; pointer-events:none; }
        .joy-zone { width:100px; height:100px; background:rgba(255,255,255,0.1); border-radius:50%; border:2px solid rgba(255,255,255,0.3); pointer-events:auto; }
        .circle-btn { width:75px; height:75px; background:rgba(255,68,68,0.6); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid #fff; pointer-events:auto; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="lang-step" class="modal">
        <h2>ZOMBIE CITY</h2>
        <button class="btn" onclick="setLang('uk')">Українська</button>
        <button class="btn" onclick="setLang('en')">English</button>
    </div>
    <div id="device-step" class="modal" style="display:none;">
        <h2 id="dev-t">Пристрій</h2>
        <button class="btn" onclick="setDev('pc')">💻 ПК (Клавіатура)</button>
        <button class="btn" onclick="setDev('mobile')">📱 Телефон (Сенсор)</button>
    </div>
</div>

<div id="ui">
    <div id="stats"></div>
    <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>
    <button class="btn" onclick="reload()">🔄 RELOAD</button>
</div>

<div id="mobile-ui">
    <div id="joystick" class="joy-zone"></div>
    <div id="fireBtn" class="circle-btn" style="background:rgba(255,215,0,0.6)">FIRE</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lang = localStorage.getItem('z_lang');
let device = '', paused = false, gameOver = false;
let score = 0, wave = 1, lastShotTime = 0;
let player, zombies = [], bullets = [], keys = {}, mouse = {x:0, y:0};
let isFiring = false;

const txt = {
    uk: { dev:"Оберіть пристрій", hp:"❤️ HP", wave:"🌊 Хвиля", pause:"⏸ Пауза", resume:"▶ Грати", ammo:"📦 Набої" },
    en: { dev:"Select Device", hp:"❤️ HP", wave:"🌊 Wave", pause:"⏸ Pause", resume:"▶ Resume", ammo:"📦 Ammo" }
};

function setLang(l) {
    lang = l; localStorage.setItem('z_lang', l);
    document.getElementById('lang-step').style.display = 'none';
    document.getElementById('device-step').style.display = 'block';
    document.getElementById('dev-t').innerText = txt[lang].dev;
}

if(lang) {
    document.getElementById('lang-step').style.display = 'none';
    document.getElementById('device-step').style.display = 'block';
    document.getElementById('dev-t').innerText = txt[lang].dev;
}

function setDev(d) {
    device = d;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    if(d === 'mobile') document.getElementById('mobile-ui').style.display = 'flex';
    init();
}

function init() {
    player = { x:canvas.width/2, y:canvas.height/2, hp:100, ammo:12, maxAmmo:12, reloading:false, lastHit:0 };
    
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    
    canvas.onmousedown = e => { if(device==='pc') isFiring = true; mouse.x = e.clientX; mouse.y = e.clientY; };
    window.onmouseup = () => isFiring = false;
    canvas.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };

    if(device === 'mobile') {
        const f = document.getElementById('fireBtn');
        f.ontouchstart = (e) => { e.preventDefault(); isFiring = true; };
        f.ontouchend = (e) => { e.preventDefault(); isFiring = false; };
        
        const j = document.getElementById('joystick');
        j.ontouchmove = (e) => {
            e.preventDefault();
            let t = e.touches[0]; let r = j.getBoundingClientRect();
            let cx = r.left + r.width/2, cy = r.top + r.height/2;
            keys['ArrowUp'] = t.clientY < cy - 10; keys['ArrowDown'] = t.clientY > cy + 10;
            keys['ArrowLeft'] = t.clientX < cx - 10; keys['ArrowRight'] = t.clientX > cx + 10;
        };
        j.ontouchend = () => { keys['ArrowUp']=keys['ArrowDown']=keys['ArrowLeft']=keys['ArrowRight']=false; };
    }
    spawn();
    requestAnimationFrame(loop);
}

class Zombie {
    constructor() {
        let s = Math.floor(Math.random()*4);
        this.x = s%2===0 ? Math.random()*canvas.width : (s===1?canvas.width+50:-50);
        this.y = s%2!==0 ? Math.random()*canvas.height : (s===0?-50:canvas.height+50);
        this.hp = 40 + (wave*10); this.speed = 1.2 + (Math.random() * wave * 0.1);
        this.color = ["#166534", "#f87171", "#450a0a"][Math.floor(Math.random()*3)];
    }
    update() {
        let dx = player.x - this.x, dy = player.y - this.y, d = Math.hypot(dx, dy);
        this.x += (dx/d)*this.speed; this.y += (dy/d)*this.speed;
        if(d < 30 && Date.now() - player.lastHit > 1000) { player.hp -= 10; player.lastHit = Date.now(); }
    }
}

function loop() {
    if(paused || gameOver) return;
    update(); draw();
    requestAnimationFrame(loop);
}

function update() {
    if(keys['KeyW'] || keys['ArrowUp']) player.y -= 3.5;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += 3.5;
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= 3.5;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += 3.5;

    if(isFiring && Date.now() - lastShotTime > 200 && player.ammo > 0 && !player.reloading) {
        let angle = 0;
        if(device === 'pc') {
            angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        } else if(zombies.length > 0) {
            let target = zombies[0];
            angle = Math.atan2(target.y - player.y, target.x - player.x);
        }
        bullets.push({x:player.x, y:player.y, vx:Math.cos(angle)*10, vy:Math.sin(angle)*10});
        player.ammo--; lastShotTime = Date.now();
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1);
        zombies.forEach((z, zi) => {
            if(Math.hypot(b.x-z.x, b.y-z.y) < 20) { z.hp -= 30; bullets.splice(i,1); if(z.hp<=0) { zombies.splice(zi,1); score+=10; } }
        });
    });

    zombies.forEach(z => z.update());
    if(zombies.length === 0) { wave++; spawn(); }
    if(player.hp <= 0) { alert("Кінець гри! Хвиля: " + wave); location.reload(); }
    
    document.getElementById('stats').innerHTML = `${txt[lang].hp}: ${player.hp} | ${txt[lang].wave}: ${wave} | ${txt[lang].ammo}: ${player.reloading ? "..." : player.ammo}`;
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#3b82f6"; ctx.beginPath(); ctx.arc(player.x, player.y, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 5, 5));
    zombies.forEach(z => { ctx.fillStyle = z.color; ctx.fillRect(z.x-15, z.y-15, 30, 30); });
}

function reload() { if(player.reloading) return; player.reloading = true; setTimeout(() => { player.ammo=player.maxAmmo; player.reloading=false; }, 1500); }
function togglePause() { paused = !paused; document.getElementById('pauseBtn').innerText = paused ? txt[lang].resume : txt[lang].pause; if(!paused) loop(); }
function spawn() { for(let i=0; i<4+wave; i++) zombies.push(new Zombie()); }
</script>
</body>
</html>
