<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter City</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Segoe UI;
background:#111;
color:white;
}

canvas{
display:block;
background:#1a1a1a;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.8);
padding:15px;
border-radius:10px;
border:2px solid #444;
z-index:100;
display:none;
}

button{
margin:4px;
padding:8px;
border:none;
border-radius:6px;
background:#444;
color:white;
cursor:pointer;
}

button:hover{
background:#666;
}

.centerMenu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:12px;
text-align:center;
border:2px solid #ff4444;
}

#mobileControls{
position:absolute;
bottom:20px;
left:20px;
z-index:200;
display:none;
}

#mobileControls button{
width:60px;
height:60px;
font-size:20px;
}

#pcHelp{
position:absolute;
bottom:20px;
right:20px;
background:#000a;
padding:10px;
display:none;
}

</style>
</head>

<body>

<div id="langSelect" class="centerMenu">
<h2>ZOMBIE SHOOTER CITY</h2>
<p>Оберіть мову</p>

<button onclick="startGame('uk')">Українська</button>
<button onclick="startGame('en')">English</button>
</div>


<div id="deviceSelect" class="centerMenu" style="display:none">

<h2>Оберіть пристрій</h2>

<button onclick="chooseDevice('pc')">ПК</button>
<button onclick="chooseDevice('mobile')">Телефон</button>

</div>


<div id="ui">

<div id="stats"></div>

<button id="shopBtn"></button>
<button id="reloadBtn"></button>
<button id="pauseBtn"></button>

</div>


<div id="mobileControls">

<br>
<button onmousedown="keys['arrowup']=true" onmouseup="keys['arrowup']=false">↑</button>

<br>

<button onmousedown="keys['arrowleft']=true" onmouseup="keys['arrowleft']=false">←</button>

<button onmousedown="keys['arrowdown']=true" onmouseup="keys['arrowdown']=false">↓</button>

<button onmousedown="keys['arrowright']=true" onmouseup="keys['arrowright']=false">→</button>

<br>

<button onclick="reload()">🔄</button>

</div>


<div id="pcHelp">

WASD / Стрілки — рух  
<br>
ЛКМ — стріляти  
<br>
R — перезарядка  
<br>
ESC — пауза

</div>


<canvas id="game"></canvas>

<script>


let lang="uk"
let device="pc"

const texts={
uk:{
shop:"🛒 Магазин",
pause:"⏸ Пауза",
resume:"▶ Продовжити",
reload:"🔄 Перезарядка",
coins:"Монети",
score:"Очки",
hp:"Життя",
wave:"Хвиля",
gameover:"Гру закінчено! Очки:"
},

en:{
shop:"Shop",
pause:"Pause",
resume:"Resume",
reload:"Reload",
coins:"Coins",
score:"Score",
hp:"HP",
wave:"Wave",
gameover:"Game Over! Score:"
}
}


const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight


let player
let zombies=[]
let bullets=[]
let keys={}

let coins=0
let score=0
let wave=1
let waveActive=false

let paused=false
let gameOver=false

let ammo=12
let reloading=false
let lastShot=0


function startGame(selectedLang){

lang=selectedLang

localStorage.setItem("zsc_lang",lang)

document.getElementById("langSelect").style.display="none"

document.getElementById("deviceSelect").style.display="block"

}


function chooseDevice(type){

device=type

document.getElementById("deviceSelect").style.display="none"
document.getElementById("ui").style.display="block"

if(device==="mobile")
document.getElementById("mobileControls").style.display="block"

if(device==="pc")
document.getElementById("pcHelp").style.display="block"

initGame()

requestAnimationFrame(loop)

}


function initGame(){

player={
x:canvas.width/2,
y:canvas.height/2,
size:20,
speed:4,
hp:100
}

zombies=[]
bullets=[]

score=0
wave=1

startWave()

}


class Zombie{

constructor(x,y,type){

this.x=x
this.y=y
this.type=type

const config={

light:{size:20,hp:30,speed:2,color:"#4ade80"},

runner:{size:18,hp:20,speed:3.5,color:"#86efac"},

medium:{size:25,hp:60,speed:1.5,color:"#22c55e"},

toxic:{size:25,hp:50,speed:1.2,color:"#84cc16"},

heavy:{size:35,hp:150,speed:0.8,color:"#166534"},

tank:{size:45,hp:300,speed:0.5,color:"#14532d"}

}

Object.assign(this,config[type])

this.maxHp=this.hp

this.lastHit=0
this.hitDelay=800

}


update(){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.hypot(dx,dy)

this.x+=(dx/dist)*this.speed
this.y+=(dy/dist)*this.speed


if(dist<this.size){

if(Date.now()-this.lastHit>this.hitDelay){

player.hp-=8

this.lastHit=Date.now()

}

}

}


draw(){

ctx.fillStyle=this.color

ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size)

}

}



function startWave(){

waveActive=true

let count=5+wave*2

for(let i=0;i<count;i++){

setTimeout(()=>{

let edge=Math.floor(Math.random()*4)

let x,y

if(edge===0){x=Math.random()*canvas.width;y=-50}
if(edge===1){x=canvas.width+50;y=Math.random()*canvas.height}
if(edge===2){x=Math.random()*canvas.width;y=canvas.height+50}
if(edge===3){x=-50;y=Math.random()*canvas.height}

let types=["light"]

if(wave>2)types.push("runner")
if(wave>4)types.push("medium")
if(wave>6)types.push("toxic")
if(wave>8)types.push("heavy")
if(wave>10)types.push("tank")

let type=types[Math.floor(Math.random()*types.length)]

zombies.push(new Zombie(x,y,type))

},i*400)

}

}


function loop(){

if(gameOver)return

if(!paused)update()

draw()

requestAnimationFrame(loop)

}


function update(){

let mx=0
let my=0

if(keys['w']||keys['arrowup'])my-=player.speed
if(keys['s']||keys['arrowdown'])my+=player.speed
if(keys['a']||keys['arrowleft'])mx-=player.speed
if(keys['d']||keys['arrowright'])mx+=player.speed

player.x+=mx
player.y+=my


bullets.forEach((b,i)=>{

b.x+=b.dx
b.y+=b.dy

zombies.forEach((z,zi)=>{

if(Math.hypot(b.x-z.x,b.y-z.y)<z.size){

z.hp-=20

bullets.splice(i,1)

if(z.hp<=0){

score+=10
coins+=3

zombies.splice(zi,1)

}

}

})

})


zombies.forEach(z=>z.update())


if(zombies.length===0&&waveActive){

waveActive=false

wave++

setTimeout(startWave,2000)

}


if(player.hp<=0)endGame()

updateUI()

}


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#3b82f6"

ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()


ctx.fillStyle="yellow"

bullets.forEach(b=>{

ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

})


zombies.forEach(z=>z.draw())

}


canvas.addEventListener("mousedown",e=>{

if(paused)return

if(Date.now()-lastShot<300)return

lastShot=Date.now()

bullets.push({

x:player.x,
y:player.y,

dx:(e.clientX-player.x)/20,

dy:(e.clientY-player.y)/20

})

})


function reload(){

if(reloading)return

reloading=true

setTimeout(()=>{

ammo=12
reloading=false

},1200)

}


function togglePause(){

paused=!paused

}


function updateUI(){

document.getElementById("stats").innerHTML=

texts[lang].hp+": "+Math.ceil(player.hp)+"<br>"+

texts[lang].score+": "+score+"<br>"+

texts[lang].coins+": "+coins+"<br>"+

texts[lang].wave+": "+wave


document.getElementById("shopBtn").innerText=texts[lang].shop
document.getElementById("reloadBtn").innerText=texts[lang].reload
document.getElementById("pauseBtn").innerText=paused?texts[lang].resume:texts[lang].pause

}


function endGame(){

gameOver=true

alert(texts[lang].gameover+" "+score)

initGame()

}


window.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()]=true

if(e.key==="Escape")togglePause()

if(e.key==="r")reload()

})


window.addEventListener("keyup",e=>{

keys[e.key.toLowerCase()]=false

})

</script>

</body>
</html>
