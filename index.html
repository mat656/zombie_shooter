<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Zombie Shooter City</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: white; }
        canvas { display: block; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #444; z-index: 100; display: none; min-width: 150px; }
        button { margin: 5px 0; cursor: pointer; padding: 8px; width: 100%; border: none; border-radius: 5px; background: #444; color: white; transition: 0.3s; }
        button:hover { background: #666; }
        #langSelect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #ff4444; }
        #shop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.95); padding: 20px; border-radius: 15px; border: 2px solid #ffd700; display: none; z-index: 200; width: 300px; }
        .shop-item { border-bottom: 1px solid #444; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="langSelect">
    <h2>ZOMBIE SHOOTER CITY</h2>
    <p>Оберіть мову / Choose Language</p>
    <button onclick="startGame('uk')">Українська</button>
    <button onclick="startGame('en')">English</button>
</div>

<div id="ui">
    <div id="stats"></div>
    <button id="shopBtn"></button>
    <button id="reloadBtn"></button>
    <button id="pauseBtn"></button>
</div>

<div id="shop">
    <h2 id="shopTitle">Магазин</h2>
    <div id="shopList"></div>
    <button onclick="toggleShop()" style="background: #ff4444;">Вийти</button>
</div>

<canvas id="game"></canvas>

<script>
// =================== Конфігурація та Тексти ===================
let lang = "uk";
const texts = {
    uk: { shop: "🛒 Магазин", pause: "⏸ Пауза", resume: "▶ Продовжити", reload: "🔄 Перезарядка", gameover: "Гру закінчено! Очки: ", coins: "🪙 Монети", score: "🎯 Очки", hp: "❤️ Життя", wave: "🌊 Хвиля", buy: "Купити", equip: "Взяти", price: "Ціна" },
    en: { shop: "🛒 Shop", pause: "⏸ Pause", resume: "▶ Resume", reload: "🔄 Reload", gameover: "Game Over! Score: ", coins: "🪙 Coins", score: "🎯 Score", hp: "❤️ HP", wave: "🌊 Wave", buy: "Buy", equip: "Equip", price: "Price" }
};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =================== Стан гри ===================
let player, weapons, ownedWeapons, currentWeapon, ammo, reloading, lastShot;
let coins, score, wave, waveActive, gameOver, paused;
let keys = {}, zombies = [], bullets = [], walls = [];

function startGame(selectedLang) {
    lang = selectedLang;
    document.getElementById("langSelect").style.display = "none";
    document.getElementById("ui").style.display = "block";
    initGame();
    requestAnimationFrame(loop);
}

function initGame() {
    player = { x: canvas.width / 2, y: canvas.height / 2, size: 20, speed: 4, hp: 100, maxHp: 100 };
    weapons = {
        pistol: { name: "Pistol", damage: 20, speed: 10, fireRate: 400, mag: 12, reload: 1200, price: 0 },
        rifle: { name: "Rifle", damage: 15, speed: 15, fireRate: 150, mag: 30, reload: 2000, price: 250 },
        shotgun: { name: "Shotgun", damage: 45, speed: 8, fireRate: 800, mag: 6, reload: 2500, price: 500 }
    };
    
    ownedWeapons = JSON.parse(localStorage.getItem("zsc_owned")) || ["pistol"];
    currentWeapon = localStorage.getItem("zsc_current") || "pistol";
    coins = parseInt(localStorage.getItem("zsc_coins")) || 0;
    
    ammo = weapons[currentWeapon].mag;
    reloading = false; lastShot = 0; score = 0; wave = 1; gameOver = false; paused = false;
    
    document.getElementById("shopBtn").onclick = toggleShop;
    document.getElementById("pauseBtn").onclick = togglePause;
    document.getElementById("reloadBtn").onclick = reload;

    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
    
    generateWalls();
    startWave();
}

function generateWalls() {
    walls = [];
    for (let i = 0; i < 6; i++) {
        walls.push({
            x: Math.random() * (canvas.width - 150),
            y: Math.random() * (canvas.height - 150),
            w: 80 + Math.random() * 100,
            h: 80 + Math.random() * 100
        });
    }
}

// =================== Клас Зомбі ===================
class Zombie {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        const config = {
            light: { size: 20, hp: 30, speed: 2.2, color: "#4ade80" },
            medium: { size: 25, hp: 60, speed: 1.5, color: "#22c55e" },
            heavy: { size: 35, hp: 150, speed: 0.8, color: "#166534" }
        };
        Object.assign(this, config[type]);
        this.maxHp = this.hp;
        this.type = type;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        // Смужка здоров'я
        ctx.fillStyle = "red";
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2 - 10, this.size, 4);
        ctx.fillStyle = "lime";
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2 - 10, (this.hp/this.maxHp)*this.size, 4);
    }
    update() {
        let dx = player.x - this.x, dy = player.y - this.y;
        let dist = Math.hypot(dx, dy);
        this.x += (dx/dist) * this.speed;
        this.y += (dy/dist) * this.speed;
        if(dist < this.size) player.hp -= 0.2;
    }
}

function startWave() {
    waveActive = true;
    let count = 5 + wave * 2;
    for(let i = 0; i < count; i++) {
        setTimeout(() => {
            if (gameOver || paused) return;
            let edge = Math.floor(Math.random() * 4);
            let x, y;
            if(edge === 0) { x = Math.random()*canvas.width; y = -50; }
            else if(edge === 1) { x = canvas.width+50; y = Math.random()*canvas.height; }
            else if(edge === 2) { x = Math.random()*canvas.width; y = canvas.height+50; }
            else { x = -50; y = Math.random()*canvas.height; }
            
            let type = "light";
            if(wave > 3) type = Math.random() > 0.7 ? "medium" : "light";
            if(wave > 7) type = Math.random() > 0.8 ? "heavy" : "medium";
            
            zombies.push(new Zombie(x, y, type));
        }, i * 500);
    }
}

// =================== Основний цикл ===================
function loop() {
    if (gameOver) return;
    if (!paused) {
        update();
    }
    draw();
    requestAnimationFrame(loop);
}

function update() {
    // Рух гравця
    let mx = 0, my = 0;
    if (keys['w']) my -= player.speed;
    if (keys['s']) my += player.speed;
    if (keys['a']) mx -= player.speed;
    if (keys['d']) mx += player.speed;
    
    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x + mx));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y + my));

    // Стрільба
    bullets.forEach((b, i) => {
        b.x += b.dx; b.y += b.dy;
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        
        zombies.forEach((z, zi) => {
            if(Math.hypot(b.x - z.x, b.y - z.y) < z.size) {
                z.hp -= b.damage;
                bullets.splice(i, 1);
                if(z.hp <= 0) {
                    coins += (z.type === "heavy" ? 15 : (z.type === "medium" ? 7 : 3));
                    score += 10;
                    zombies.splice(zi, 1);
                }
            }
        });
    });

    zombies.forEach(z => z.update());
    
    if (zombies.length === 0 && waveActive) {
        waveActive = false;
        wave++;
        setTimeout(startWave, 2000);
    }

    if (player.hp <= 0) endGame();
    updateUI();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Стіни
    ctx.fillStyle = "#333";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
    
    // Гравець
    ctx.fillStyle = "#3b82f6";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();
    
    // Кулі
    ctx.fillStyle = "#fde047";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
        ctx.fill();
    });
    
    zombies.forEach(z => z.draw());
}

// =================== Функції керування ===================
function shoot(e) {
    if(paused || reloading || ammo <= 0) return;
    const w = weapons[currentWeapon];
    if(Date.now() - lastShot < w.fireRate) return;
    
    lastShot = Date.now();
    ammo--;
    
    const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
    
    if(currentWeapon === "shotgun") {
        for(let i = -1; i <= 1; i++) {
            bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle + i*0.2)*w.speed, dy: Math.sin(angle + i*0.2)*w.speed, damage: w.damage });
        }
    } else {
        bullets.push({ x: player.x, y: player.y, dx: Math.cos(angle)*w.speed, dy: Math.sin(angle)*w.speed, damage: w.damage });
    }
}

canvas.addEventListener("mousedown", shoot);

function reload() {
    if (reloading || ammo === weapons[currentWeapon].mag) return;
    reloading = true;
    setTimeout(() => {
        ammo = weapons[currentWeapon].mag;
        reloading = false;
    }, weapons[currentWeapon].reload);
}

function togglePause() {
    paused = !paused;
    document.getElementById("pauseBtn").innerText = paused ? texts[lang].resume : texts[lang].pause;
}

function toggleShop() {
    const shopDiv = document.getElementById("shop");
    const isVisible = shopDiv.style.display === "block";
    shopDiv.style.display = isVisible ? "none" : "block";
    paused = !isVisible;
    if(!isVisible) renderShop();
}

function renderShop() {
    const list = document.getElementById("shopList");
    list.innerHTML = "";
    for (let key in weapons) {
        const w = weapons[key];
        const isOwned = ownedWeapons.includes(key);
        const item = document.createElement("div");
        item.className = "shop-item";
        item.innerHTML = `
            <span>${w.name} ${!isOwned ? `(${texts[lang].price}: ${w.price})` : ""}</span>
            <button onclick="buyWeapon('${key}')" style="width:80px; background:${currentWeapon===key?'#22c55e':'#444'}">
                ${isOwned ? (currentWeapon===key ? "✔" : texts[lang].equip) : texts[lang].buy}
            </button>
        `;
        list.appendChild(item);
    }
}

function buyWeapon(key) {
    if (ownedWeapons.includes(key)) {
        currentWeapon = key;
        ammo = weapons[key].mag;
        reloading = false;
    } else if (coins >= weapons[key].price) {
        coins -= weapons[key].price;
        ownedWeapons.push(key);
        currentWeapon = key;
        ammo = weapons[key].mag;
    }
    localStorage.setItem("zsc_owned", JSON.stringify(ownedWeapons));
    localStorage.setItem("zsc_current", currentWeapon);
    localStorage.setItem("zsc_coins", coins);
    renderShop();
}

function updateUI() {
    const w = weapons[currentWeapon];
    document.getElementById("stats").innerHTML = `
        ${texts[lang].hp}: ${Math.ceil(player.hp)}<br>
        ${texts[lang].score}: ${score}<br>
        ${texts[lang].coins}: ${coins}<br>
        <hr>
        🔫 ${w.name}<br>
        🔋 ${reloading ? "..." : ammo + " / " + w.mag}<br>
        ${texts[lang].wave}: ${wave}
    `;
    document.getElementById("shopBtn").innerText = texts[lang].shop;
    document.getElementById("reloadBtn").innerText = texts[lang].reload;
}

function endGame() {
    gameOver = true;
    localStorage.setItem("zsc_coins", coins);
    alert(texts[lang].gameover + score);
    location.reload();
}
</script>
</body>
</html>
